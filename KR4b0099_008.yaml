body:
  text: 附錄挽歌挽歌人生鮮能百哀情數萬端不幸嬰篤病凶候形素顏衣衾為誰施束帶就闔棺欲悲淚已竭欲辭不能言存亡自遠近長夜何漫漫壽堂閑且長祖載歸不還書鈔九十二人生鮮能百哀情數萬嬰路柳夾靈轜旟旐隨風征車輪結不轉百駟齊悲鳴同上靈坐飛塵起魂衣正委移芒芒丘墓間松柏鬱參差明器無用時桐車不可馳平生坐玉殿沒歸都幽宮地下無刻漏安知夏與冬書鈔九十二九十四引行一韻擬楚篇擬楚篇登崑崙漱玉池文選三十一雜體詩注光滅星離文選十二江賦注豔歌行豔歌行咄來長歌續短歌文選二十七長歌行注樂府樂府胡飯兼御相國食前方丈殊珍書鈔百四十五粉加甲煎名香熏陸艾納廻光書鈔百三十五穆穆三春節天氣暖且和書鈔百五十四初學記三男當進曰女適人投心委命受身書鈔八十四昔有林號曰陰康始教民舞涕氣以揚之書鈔百七東方將欲和太白星飛芒曜靈照照舒光書鈔百四十九歌歌寶劍神奇鏤象龍螭通犀文玉明珠錯地光如電影擬之則離書鈔百二十二有所思兮在天一方何以贈之玉佩珠璜御覽八百七飛沉殊厥趣草木以區別鸞鷖樂山林龍蛇安藪穴書鈔百五十八黃葉離高柯丹棗坐自零不惜棗自零念我少弟兄御覽九百六十五事類賦棗賦注又初學記二十八引零一韻日中萬影正夕中萬影傾文選二十大將軍宴會被命作詩注曲池何澹澹芙蓉敞清源榮華盛壯時見者誰不賞歎一朝光采落故人不廻顏御覽九百九十九歌者齊絃舞者振鐸絃錚錚鐸朗朗書鈔百八所樂亦非琴唯言琵琶與箏能娛我心書鈔百一十初學記十六兔搗藥月間安足道神烏戲雲間安足道初學記二十九草堂詩箋十月詩注御覽九百七事類賦兔賦注萬花谷後三十九青雲徘徊謂我愁御覽八我家近宮掖易知復難忘黃金為閤門白玉為殿堂御覽百八十四雜詩雜詩習習谷風興回回景雲飛青天敷翠采朝日含丹輝書鈔百四十九百五十四四言雜詩四言雜詩忽然長逝火滅煙消書鈔九十二初學記十四萬花谷後二十二七哀詩七哀詩杳杳三泉室冥冥玄夜堂書鈔九十二擬馬防詩擬馬防詩繇役無止時徵發傾四海書鈔四十一雜詩雜詩浮萍蔽綠水楊柳何依依繁華正葳蕤書鈔百五十四浮雲含愁氣悲風坐自歎書鈔百五十文選十三雪賦注御覽八團團三五日皎皎曜清暉書鈔百五十炎景時鬱蒸海沸沙石融書鈔百五十六詩詩蕭蕭秋氣升凄凄萬物衰榮華盡零落槁葉縱橫飛書鈔百五十四蟾蜍食明月虹蜺薄朝日御覽九百四十九驚颷晝夜起書鈔百五十六飢食野棗實類聚八十七机榻委塵埃文選三十和謝宣城詩注晉郊祀歌夕牲歌夕牲歌天命有晉穆穆明明我其夙夜祗事上靈常于時假迄用其成於薦玄牡進夕其牲崇德作樂神祇是聽迎送神歌迎送神歌宣文蒸哉日靖四方永言保之夙夜匪康光天之命上帝是皇嘉樂殷薦靈祚景祥神祇降假享福無疆饗神歌饗神歌天祚有晉其命惟新受終于魏奄有兆民燕及皇天懷柔百神丕顯遺烈之德之純享其玄牡式用肇禋神祇來格福祿是臻時邁其猶昊天子之祐享有晉兆民戴之畏天之威敬授人時丕顯丕承於猶繹思皇極斯建庶績咸熙庶幾夙夜惟晉之祺宣文惟后克配彼天撫寧四海保有康年於乎緝熙肆用靖民爰立典制爰修禮紀作民之極莫匪資始克昌厥後永言保之晉天地郊明堂歌夕牲歌皇矣有晉時邁其德受終于天光濟萬國萬國既光神定厥祥虔于郊祀祗事上皇祗事上皇百福是臻巍巍祖考克配彼天嘉牲匪歆德馨惟饗受天之祐神化四方降神歌於赫大晉膺天景祥二帝邁德宣茲重光我皇受命奄有萬方郊祀配享禮樂孔章神祇嘉饗祖考是皇克昌厥後保祚無疆天郊饗神歌整泰壇祀皇神精氣感百靈賓蘊朱火燎芳薪紫煙遊冠青雲神之體靡象形曠無方幽以清神之來光景照聽無聞視無兆神之至舉歆歆靈爽協動余心神之坐同歡娛澤雲翔化風舒嘉樂奏文中聲八音諧神是聽咸潔齊並芬芳烹牷牲享玉觴神悅饗歆禋祀祐大晉降繁祉祚京邑行四海保天年窮地紀地郊饗神歌整泰折竢皇祇眾神感群靈儀陰祀設吉禮施夜將極時未移祇之體無形象潛泰幽洞忽荒祇之出薆若有靈無遠天下母祇之來遺光景昭若存終冥冥祇之至舉欣欣舞象德歌成文祇之坐同歡豫澤雨施化雲布樂八變聲教敷物咸亨祇是娛齊既潔侍者肅玉觴進咸穆穆饗嘉豢歆德馨祚有晉暨群生溢九壤格天庭保萬壽延億齡明堂饗神歌經始明堂享祀匪懈於皇烈考光配上帝赫赫上帝既高既崇聖考是配明德顯融率土敬職萬方來祭常于時假保祚永世晉宗廟歌夕牲歌我夕我牲猗歟敬止嘉豢孔時供茲享祀神鑒厥誠博碩斯歆祖考降饗以虞孝孫之心迎送神歌嗚呼悠哉日鑒在茲以時享祀神明降之神明斯降既祐饗之祚我無疆受天之祜赫赫太上巍巍聖祖明明烈考丕承繼序征西將軍登歌經始宗廟神明戾止申錫無疆祗承享祀假我皇祖綏予孫子燕及後昆錫茲繁祉豫章府君登歌嘉樂在庭薦祀在堂皇皇宗廟乃祖乃皇濟濟辟公相予蒸嘗享祀不忒降福穰穰潁川府君登歌於邈先后實司于天顯矣皇祖帝祉肇臻本支克昌資始開元惠我無疆享祀永年京兆府君登歌於惟曾皇顯顯令德高明清亮匪競柔克保乂命祐基命惟則篤生聖祖光濟四國宣皇帝登歌於鑠皇祖聖德欽明勤施四方夙夜敬止載敷文教載揚武烈匡定社稷龔行天罰經始大業造創帝基畏天之命于時保之景皇帝登歌執競景皇克明克哲旁作穆穆惟祗惟畏纂宣之緒耆定厥功登此儁乂糾彼群凶業業在位帝既勤止維天之命於穆不已文皇帝登歌於皇時晉允文文祖聰明叡智聖敬神武萬幾莫綜皇斯清之虎兕放命皇斯平之柔遠能邇簡授英賢創業垂統勳格皇天饗神歌二首曰晉是常享祀時序宗廟致敬禮樂具舉惟其來祭普天率土犧樽既奠清酤既載亦有和羹薦羞斯備烝烝永慕感時興思登歌奏舞神樂其和祖考來格祐我邦家敷天之下罔不休嘉肅肅在位濟濟臣工四海來格禮儀有容鐘鼓振管絃理舞開元歌永始神胥樂兮肅肅在位臣工濟濟小大咸敬上下有禮理管絃振鼓鐘舞象德歌詠功神胥樂兮肅肅在位有來雍雍穆穆天子相惟辟公禮有儀樂有則舞象功歌詠德神胥樂兮晉四廂樂歌正旦大會行禮歌天鑒有晉世祚聖皇時齊七政朝此萬方鐘鼓斯震九賓備禮正位在朝穆穆濟濟煌煌三辰實麗于天君后是象威儀孔虔率禮無愆莫匪邁德儀刑聖皇萬邦惟則天鑒四章章四句上壽酒歌於赫明明聖德龍興三朝獻酒萬壽是膺敷佑四方如日之升自天降祚元吉有徵於赫一章八句食舉東西廂歌天命大晉載育群生於穆上德隨時化成自祖配命皇皇后辟繼天創業宣文之績丕顯宣文先知稼穡克恭克儉足教足食既教食之弘濟艱難上帝是祐下民所安天祐聖皇萬邦來賀雖安勿安乾乾匪暇乃正丘郊乃定冢社廙廙作宗光宅天下惟敬朝饗爰奏食舉盡禮供御嘉樂有序樹羽設業笙鏞以閒琴瑟齊列亦有箎塤喤喤鼓鐘鎗鎗磬管八音克諧載夷載簡既夷既簡其大不禦風化潛興如雲如雨如雲之覆如雨之潤聲教所暨無思不順教以化之樂以和之和而養之時惟邕熙禮慎其儀樂節其聲於鑠皇繇既和且平天命十三章章四句晉鼓吹曲靈之祥靈之祥石瑞章旌金德出西方天降命授宣皇應期運時龍驤繼大舜佐陶唐讚武文建帝綱孟氏叛據南疆追有扈亂五常吳寇勁蜀虜強交誓盟連遐荒宣赫怒奮鷹揚震乾威曜電光陵九天陷石城梟逆命拯有生萬國安四海寧宣受命宣受命應天機風雲時動神龍飛禦諸葛鎮雍梁邊境安夷夏康務節事勤定傾攬英雄保持盈淵穆穆赫明明沖而泰天之經養威重運神兵亮乃震斃天下寧征遼東征遼東敵失據威靈邁日域公孫既授首群逆破膽咸震怖朔北響應海表景附武功赫赫德雲布宣輔政宣皇輔政聖烈深撥亂反正從天心網羅文武才慎厥所生所生賢遺教施安上治民化風移肇創帝基洪業垂於鑠明明時赫戲功濟萬世定二儀定二儀雲澤雨施海外風馳時運多難時運多難道教痡天地變化有盈虛蠢爾吳蠻虎視江湖我皇赫斯致天誅有征無戰弭其圖天威橫被廓東隅景龍飛景龍飛御天威聰鑒玄察動與神明協機從之者顯逆之者滅夷文教敷武功巍普被四海萬邦望風莫不來綏聖德潛斷先天弗違弗違祥享世永長猛以致寬道化光赫明明祚隆無疆帝績惟期有命既集崇此洪基平玉衡平玉衡糾姦回萬國殊風四海乖禮賢養士羈御英雄思心齊纂戎洪業崇皇階品物咸亨聖敬日躋聰鑒盡下情明明綜天機文皇統百揆文皇統百揆繼天理萬方武將鎮四隅英佐盈朝堂謀言協秋蘭清風發其芳洪澤所漸潤礫石為珪璋大道侔五帝盛德踰三王咸光大上參天與地至化無內外無內外六合並康乂並康乂遘茲嘉會在昔羲與農大晉德斯邁鎮征及諸州為蕃衛玄功濟四海洪烈流萬世因時運因時運聖策施長蛇交解群桀離勢窮奔吳虎騎厲惟武進審大計時邁其德清一世惟庸蜀惟庸蜀僭號天一隅劉備逆帝命禪亮承其餘擁眾數十萬闚隙乘我虛驛騎進羽檄天下不遑居姜維屢寇邊隴上為荒蕪文皇愍斯民歷世受罪辜外謨蕃屏臣內謀眾士夫爪牙應指授腹心獻良圖良圖協成文大興百萬軍雷鼓震地起猛勢陵浮雲逋虜畏天誅面縛造壘門萬里同風教逆命稱妾臣光建五等紀綱天人天序天序曆應受禪承靈祜御群龍勒螭虎弘濟大化英俊作輔明明統萬機赫赫鎮四方咎繇稷契之疇協蘭芳禮王臣覆兆民化之如天與地誰敢愛其身大晉承運期大晉承運期德隆聖皇時清晏白日垂光應籙圖陟帝位繼天正玉衡化行象神明至哉道隆虞與唐元首敷洪化百寮股肱竝忠良民大康隆隆赫赫福祚盈無疆金靈運金靈運天符發聖徵見參日月惟我皇體神聖受魏禪應天命皇之興靈有徵登大麓御萬乘皇之輔若闞虎爪牙奮莫之禦皇之佐讚清化百事理萬邦賀神祇應嘉瑞章恭享禮薦先皇樂時奏磬管鏘鼓淵淵鍾喤喤奠樽俎實玉觴神歆饗咸悅康宴孫子祐無疆大孝烝烝德教被萬方於穆我皇於穆我皇盛德聖且明受禪君世光濟群生普天率土莫不來庭顒顒六合內望風仰泰清萬國雍雍興頌聲大化洽地平而天成七政齊玉衡惟平峨峨佐命濟濟群英夙夜乾乾萬機是經雖治興匪荒寧謙道光沖不盈天地合德日月同榮赫赫煌煌曜幽冥三光克從於顯天垂景星龍鳳臻甘露宵零肅神祇祗上靈萬物欣戴自天效其成仲春振旅仲春振旅大致民武教於時日新師執提工執鼓坐作從節有序盛矣允文允武蒐田表禡申法誓遂圍禁獻社祭允以時明國制文武並用禮之經列車如戰大教明古今誰能去兵大晉繼天濟群生夏苖田夏苖田運將徂軍國異容文武殊乃命群吏撰車徒辨其號名讚契書王軍啟八門行同上帝居時路建大麾雲旗翳紫虛百官象其事疾則疾徐則徐回衡旋軫罷陳弊車獻禽享祀烝烝配有虞惟大晉德參兩儀化雲敷仲秋獮田仲秋獮田金德常剛涼風清且厲凝露結為霜白藏司辰蒼隼時鷹揚鷹揚猶尚父順天以殺伐春秋時敘雷霆震威曜進退由鉦鼓致禽祀祊羽毛之用充軍府赫赫大晉德芬烈陵三五敷化以文雖治不廢武光宅四海永享天之祜順天道順天道順天道握神契三時示講武事冬大閱鳴鐲振鼓鐸旌旗象虹霓文制其中武不窮武動軍誓眾禮成而義舉三驅以崇仁進止不失其序兵卒練將如闞虎惟闞虎氣陵青雲解圍三面殺不殄群偃旌麾班六軍獻享烝修典文嘉大晉德配天祿報功爵俟賢饗燕樂受茲百祿嘉萬年唐堯唐堯諮務成謙謙德所興積漸終光大履霜致堅冰神明道自然河海猶可凝舜禹統百揆元凱以次升禪讓應天曆睿聖世相承我皇陟帝位平衡正準繩德化飛四表祥氣見其徵興王坐俟旦亡主恬自矜致遠由近始覆簣成山陵披圖按先籍有其證靈液玄雲玄雲起丘山祥氣萬里會龍飛何蜿蜿鳳翔何翽翽昔在唐虞朝時見青雲際今親遊萬國流光溢天外鶴鳴在後園清音隨風邁成湯隆顯命伊摯來如飛周文獵渭濱遂載呂望歸符合如影響先天天弗違輟耕綜時綱解褐衿天維元功配二王芬馨世所稀我皇敘群才洪烈何巍巍桓桓征四表濟濟理萬機神化感無方髦才盈帝畿丕顯惟昧旦日新孔所咨茂哉明聖德日月同光輝伯益伯益佐舜禹職掌山與川德侔十六相思心入無間智理周萬物下知眾鳥言黃雀應清化翔集何翩翩和鳴棲庭樹徘徊雲日間夏桀為無道密網施山河酷祝振纖網當奈黃雀何殷湯崇天德去其三面羅逍遙群飛來鳴聲乃復和朱雀作南宿鳳皇統羽群赤烏銜書至天命瑞周文神雀今來遊為我受命君嘉祥致天和膏澤降青雲蘭風發芳氣闔世同其芬釣竿釣竿何冉冉甘餌芳且鮮臨川運思心微綸沈九淵太公寶此術乃在靈祕篇機變隨物移精妙貫未然游魚驚著釣潛龍飛戾天戾天安所至撫翼翔太清太清一何異兩儀出渾成玉衡正三辰造化賦群形退願輔聖君與神合其靈我君弘遠略天人不足并天人初并時昧昧何芒芒日月有徵兆文象興二皇蚩尤亂生民皇帝用兵征萬方逮夏禹而德衰三代不及虞與唐我皇聖德配堯舜受禪即祚享天祥率土蒙祐靡不肅庶事康庶事康穆穆明明荷百祿保無極永太平晉正德大豫舞歌正德舞歌天命有晉光濟萬國穆穆聖皇文武惟則在天斯正在地成德載韜政刑載崇禮教我敷玄化臻於中道大豫舞歌於鑠皇晉配天受命熙帝之光世德惟聖嘉樂大豫保祐萬姓淵兮不竭沖而用之先帝弗違虔奉天時晉宣武舞歌惟聖皇篇矛俞第一惟聖皇德巍巍光四海禮樂猶形影文武為表裏乃作巴俞肆舞士劍弩齊列戈矛為之始進退疾鷹鷂龍戰而豹起如亂不可亂動作順其理離合有統紀短兵篇劍俞第二劍為短兵其勢險危疾踰飛電回旋應規武節齊聲或合或離電發星騖若景若差兵法攸象軍容是儀軍鎮篇弩俞第三弩為遠兵軍之鎮其發有機體難動往必速重而不遲銳精分鎛射遠中微弩俞之樂一何奇變多姿退若激進若飛五聲協八音諧宣武象讚天威窮武篇安臺行亂第四窮武者喪何但敗北柔弱亡戰國家亦廢秦始徐偃既已作戒前世先王鑒其機修文整武藝文武足相濟然後德光大亂曰高則亢滿則盈亢必危盈必傾去危傾守以平沖則久濁能清混文武順天經晉宣文舞歌羽籥舞歌羲皇之初天地開元罔罟禽獸群黎以安神農教耕創業誠難民得粒食澹然無所患黃帝始征伐萬品造其端軍駕無常居是曰軒轅軒轅既勤止堯舜匪荒寧夏禹治水湯武又用兵孰能保安逸坐致太平聖皇邁乾乾天下興頌聲穆穆且明明惟聖皇道化彰澂四海清三光萬幾理庶事康潛龍升儀鳳翔風雨時物繁昌卻走馬降瑞祥揚側陋簡忠良百祿是荷眉壽無疆羽鐸舞歌昔在渾成時兩儀尚未分陽升垂清景陰降興浮雲中和合氛氳萬物各異群人倫得其序眾生樂聖君三統繼五行然後有質文皇王殊運代治亂亦繽紛伊大晉德兼往古越犧農邈舜禹參天地陵三五禮唐周樂韶武豈惟簫韶六代具舉澤霑地境化充天宇聖明臨朝元凱作輔普天同樂胥浩浩元氣遐哉太清五行流邁日月代征隨時變化庶物乃成聖皇繼天光濟群生化之以道萬國咸寧受茲介福延于億齡晉鼙舞歌五首洪業篇宣文創洪業盛德在泰始聖皇應靈符受命君四海萬國何所樂上有明天子唐堯禪帝位虞舜惟恭己恭己正南面道化與時移大赦盪萌漸文教被黃支象天則地體無為聰明配日月神聖參兩儀雖有三凶類靜言無所施象天則地體無為稷契並佐命伊呂升王臣蘭芷登朝肆下無失宿民聲發響自應表立景來附虓虎從羈制潛龍升天路備物立成器變通極其數百官以時敘萬機有常度訓之以克讓納之以忠恕群下仰清風海外同歡慕象天則地化雲布昔日貴雕飾今尚儉與素昔日多纖介今去情與故象天則地化雲布濟濟大朝士夙夜綜萬機萬機無廢理明明降疇諮臣譬列星景君配朝日暉事業並通濟功烈何巍巍五帝繼三皇三王世所歸聖德應期運天地不能違仰之彌已高猶天不可階將復御龍氏鳳皇在庭棲天命篇聖祖受天命應期輔魏皇入則綜萬機出則征四方朝廷無遺理方表寧且康道隆舜臣堯積德踰太王孟度阻窮險造亂天一隅神兵出不意奉命致天誅赦善戮有罪元惡宗為虛威風振勁蜀武烈慴強吳諸葛不知命肆逆亂天常擁徒十餘萬數來寇邊疆我皇邁神武秉鉞鎮雍涼亮乃畏天威未戰先仆僵盈虛自然運時變固多艱東征陵海表萬里梟賊淵受遺齊七政曹爽又滔天群凶受誅殛百祿咸來臻黃華應福始王淩為禍先景皇篇景皇帝聰明命世生盛德參天地帝王道大創基既已難繼世亦未易外則夏侯玄內則張與李三凶稱逆亂帝紀從天行誅窮其姦宄邊將禦其漸潛謀不得起罪人咸伏辜威風振萬里平衡綜萬機萬機無不理召陵桓不君內外何紛紛眾小便成群蒙昧恣心治亂不分叡聖獨斷濟武常以文從天惟廢立掃霓披浮雲雲霓既已闢清和未幾閒羽檄首尾至變起東南藩儉欽為長蛇外則憑吳蠻萬國紛騷擾戚戚天下懼不安神武御六軍我皇秉鉞征儉欽起壽春前鋒據項城出其不意並縱奇兵奇兵誠難御廟勝實難支兩軍不期遇敵退計無施虎騎惟武進大戰沙陽陂欽乃亡魂走奔虜若雲披天恩赦有罪東土放鯨鯢大晉篇赫赫大晉於穆文皇蕩蕩巍巍道邁陶唐世稱三皇五帝及今重其光九德克明文既顯武又章恩弘六合兼濟萬方內舉元凱朝政以綱外簡虎臣時惟鷹揚靡從不懷逆命斯亡仁配春日威踰秋霜濟濟多士同茲蘭芳唐虞至治四凶滔天致討儉欽罔不肅虔化感海外海外來賓獻其聲樂並稱妾臣西蜀猾夏僭號方域命將致討委國稽服吳人放命憑海阻江飛書告諭響應來同先王建萬國九服為蕃衛亡秦壞諸侯享祚不二世歷代不能復忽踰五百歲我皇邁聖德應期創典制分土五等藩國正封界莘莘文武佐千秋遘嘉會洪業溢區內仁風翔海外明君篇明君御四海聽鑒盡物情顧望有譴罰竭忠身必榮蘭茝出荒野萬里升紫庭茨草穢堂階掃截不得生能否莫相蒙百官正其名恭己慎有為有為無不成闇君不自信群下執異端正直罹譖潤姦臣奪其權雖欲盡忠誠結舌不敢言結舌亦何憚盡忠為身患清流豈不潔飛塵濁其源歧路令人迷未遠勝不還忠臣立君朝正色不顧身邪正不並存譬若胡與秦秦胡有合時邪正各異津忠臣遇明君乾乾惟日新群目統在綱眾星拱北辰設令遭闇主斥退為凡民雖薄供時用白茅猶可珍冰霜晝夜結蘭桂摧為薪邪臣多端變用心何委曲便辟從情指動隨君所欲偷安樂目前不問清與濁積偽罔時主養交以持祿言行恆相違難饜甚谿谷昧死射乾沒覺露則滅族雲門篇雲門篇黃雲門唐咸池虞韶舞夏夏殷濩列代有五振鐸鳴金延大武清歌發唱形為主聲和八音協律呂身不虛動手不徒舉應節合度周其敘時奏宮角雜之以徵羽下饜眾目上從鐘鼓樂以移風與德禮相輔安有失其所答卞壼詩序答卞壼詩序尚書左丞彈八座以下居萬事之會斯乃皇朝之司直天臺之管轄贈李叔龍詩贈李叔龍詩弘道興化實在良守悠悠建平皇澤未流朝選於眾乃子之授漢陽太守燮銘漢陽太守燮銘敦方足以正眾邪肅清足以濟殊俗不吐剛而謟上不茹柔而黷下正聲賦正聲賦凝霜夕結七體七體守者匿於九地以自固七社七社善惡相蒙故齊之以刑法嚴如火烈弔秦始皇賦有序弔秦始皇賦有序余治獄至長安觀乎阿房而弔始皇曰傷秦政之為暴棄仁義以自亡搦紙申辭以弔始皇有姬失統命不於常六國既平奄有萬方政虐刑酷如火之揚致周章之百萬取發掘於頊王疲斯民乎宮墓甚癸辛於夏商未旋踵而為墟屯麞麋乎廟堂國既顛而莫扶孰阻兵之為強諸官病奏諸官病奏諸官有病滿百日不差宜令去職優其禮秩既差而復用魏武帝擬古皮弁裁縑帛為白帢以易舊服魏武帝擬古皮弁裁縑帛為白帢以易舊服白乃軍容非國容也魏尚書何晏好服婦人之服魏尚書何晏好服婦人之服此服妖也夫衣裳之制所以定上下殊內外也大雅云玄袞赤舄鉤膺鏤錫敬其文也小雅云有嚴有翼共武之服詠其武也若內外不殊王制失敘服妖既作身隨之亡妹喜冠男子之冠桀亡天下何晏服婦人之服亦亡其家其咎均也吳婦人之修容者急束其髮而劘角過于耳蓋其俗自操束大急而廉隅失中之謂也故吳之風俗相驅以急言論彈射以刻薄相尚居三年之喪者往往有致毀以死諸葛患之者正交論雖不可以經訓整亂蓋亦救時之作也
