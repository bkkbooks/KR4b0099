body:
  text: 卷一短歌行長安高城層樓亭亭干雲四起上貫天庭蜉蝣何整行如軍征蟋蟀何感中夜哀鳴蚍蜉愈樂粲粲其榮寤寐念之誰知我情昔君視我如掌中珠何意一朝棄我溝渠昔君與我如影如形何意一去心如流星昔君與我兩心相結何意今日忽然兩絶樂府詩集三十廣文選十三詩紀二十二秋胡行秋胡子娶婦三日會行仕宦既享顯爵保茲德音以祿頤親韞此黃金覩一好婦採桑路傍遂下黃金誘以逢卿玉磨逾潔蘭動彌馨源流潔清水無濁波奈何秋胡中道懷邪美此節婦高行巍峨哀哉可愍自投長河類聚四十一樂府詩集三十六詩紀二十二又韻補二引邪峨二韻惟漢行危哉鴻門會沛公幾不還輕裝入人軍投身湯火間兩雄不俱立亞父見此權項莊奮劍起白刃何翩翩伯身雖為蔽事促不及旋張良懾坐側高祖變龍顏賴得樊將軍虎叱項王前嗔目駭三軍磨牙咀豚肩空卮讓霸主臨急吐奇言威凌萬乘主指顧回泰山神龍困鼎鑊非噲豈得全狗屠登上將功業信不原健兒實可慕腐儒安足歎樂府詩集二十七廣文選十三詩紀二十二豔歌行日出東南隅照我秦氏樓秦氏有好女自字為羅敷首戴金翠飾耳綴明月珠白素為下裾丹霞為上襦一顧傾朝市再顧國為虛問女居安在堂在城南居青樓臨大巷幽門結重樞使君自南來駟馬立踟蹰遣吏謝賢女豈可同行車斯女長跪對使君言何殊使君自有婦賤妾有鄙夫天地正厥位願君改其圖樂府詩集二十八廣文選十三詩紀二十二長歌行利害同根源賞下有甘鉤義門近橫塘獸口出通侯撫劍安所趨蠻方未順流蜀賊阻石城吳寇馮龍舟二軍多壯士聞賊如見讎投身效知己徒生心所羞鷹隼厲天翼恥與燕雀游成敗在縱者無令鷙鳥憂樂府詩集三十廣文選十三詩紀二十二又初學記三十引遊憂二韻苦相篇豫章行苦相篇豫章行苦相身為女卑陋難再陳男兒當門戶墮地自生神雄心志四海萬里望風塵女育無欣愛不為家所珍長大逃深室藏頭羞見人垂淚適他鄉忽如雨絶雲低頭和顏色素齒結朱脣跪拜無復數婢妾如嚴賓情合同雲漢葵藿仰陽春心乖甚水火百惡集其身玉顏隨年變丈夫多好新昔為形與影今為胡與秦胡秦時相見一絶踰參辰玉臺新詠箋注二樂府詩集三十四廣文選十三詩紀二十二又類聚四十一引陳神塵珍新秦六韻草堂詩箋三十四錦樹行注引陳神塵新四韻輕裘綴孔翠明珂曜珊瑚琅玕溢金匱文璧世所無和班氏詩和班氏詩秋胡納令室三日宦他鄉皎皎潔婦姿泠泠守空房燕婉不終夕別如參與商憂來猶四海易感難可防人言生日短愁者若夜長百草揚春華攘腕采柔桑素手尋繁枝落葉不盈筐羅衣翳玉體回目流采章君子倦仕歸車馬如龍驤精誠馳萬里既至兩相忘行人悅令顏借息此樹旁誘以逢卿喻遂下黃金裝烈烈貞女憤言詞厲秋霜長驅及居室奉金升北堂母立呼婦來歡樂情未央秋胡見此婦惕然懷探湯負心豈不慚永誓非所望清濁必異源鳧鳳不並翔引身赴長流果哉潔婦腸彼夫既不淑此婦亦太剛玉臺新詠箋注二樂府詩集三十八詩紀二十二又類聚十八及廣文選八引鄉房裳忘傍裝六韻飲馬長城窟行飲馬長城窟行青青河邊草悠悠萬里道草生在春時遠道還有期春至草不生期盡歎無聲感物懷思心夢想發中情夢君如鴛鴦比翼雲間翔既覺寂無見曠如參與商夢君結同心比翼遊北林既覺寂無見曠如商與參河洛自用固不如中嶽安回流不及返浮雲往自還悲風動思心悠悠誰知者懸景無停居忽如馳駟馬傾耳懷音響轉目淚雙墮生存無會期要君黃泉下玉臺新詠箋注二樂府詩集三十八詩紀二十二又類聚四十一廣文選十三並引道期聲情翔商六韻放歌行靈龜有枯甲神龍有腐鱗人無千歲壽存質空相因朝露尚移景促哉水上塵丘冢如履綦不識故與新高樹來悲風松柏垂威神曠野何蕭條顧望無生人但見狐狸迹虎豹自成群孤雛攀樹鳴離鳥何繽紛愁子多哀心塞耳不忍聞長嘯淚雨下太息氣成雲樂府詩集三十八詩紀二十二有女篇豔歌行有女篇豔歌行有女懷芬芳媞媞步東廂蛾眉分翠羽明目發清揚丹脣翳皓齒秀色若圭璋巧笑露權靨衆媚不可詳容儀希世出無乃古毛嬙頭安金步搖耳繫明月璫珠環約素腕翠爵垂鮮光文袍綴藻黼玉體映羅裳容華既已豔志節擬秋霜徽音冠青雲聲響流四方妙哉英媛德宜配侯與王靈應萬世合日月時相望媒氏陳素帛羔雁鳴前堂百兩迎中路起若鸞鳳翔凡夫徒踊躍望絶如參商玉臺新詠箋注二樂府詩集三十九廣文選十三詩紀二十二又書鈔百三十五引璫韻類聚十八作傅玄詩引廂陽璋嬙璫光霜七韻四十二作豔歌行引陽璋霜三韻初學記十九御覽三百八十一並作晉傅玄歌引廂光璋詳嬙璫六韻萬花谷後十五引光璋嬙璫四韻文選二十一秋胡詩注作有女篇引霜一韻牆上難為趨門有車馬客驂服若騰飛華組結玉佩蘩藻紛葳蕤馮軾垂長纓顧盻有餘輝貧主屣弊履整此藍縷衣客曰嘉病乎正色意無疑吐言若覆水搖舌不可追渭濱漁釣翁乃為周所咨顏回處陋巷大聖稱庶幾苟富不知度千駟賤采薇季孫由儉顯管仲病三歸夫差耽淫侈終為越所圍遺身外榮利然後享巍巍迷者一何衆孔難知德希甚美致憔悴不如豚豕肥楊朱泣路歧失道令人悲子貢欲自矜原憲知其非屈伸各異勢窮達不同資夫唯體中庸先天天不違樂府詩集四十廣文選十三詩紀二十二朝時篇怨歌行朝時篇怨歌行昭昭朝時日皎皎晨明月十五入君門一別終華髮同心忽異離曠若胡與越胡越有會時參辰遼且闊形影無髣佛音響寂無達纖絃感促柱觸之哀聲發情思如循環憂來不可遏塗山有餘恨詩人詠采葛蜻蛚吟床下回風起幽闥春榮隨露落芙蓉生木末自傷命不遇良辰永乖別已爾可奈何譬如紈素裂孤雌翔故巢星流光景絶魂神馳萬里甘心要同穴玉臺新詠箋注二樂府詩集四十二廣文選十三詩紀二十二明月篇明月篇皎皎明月光灼灼朝日暉昔為春繭絲今為秋女衣丹唇列素齒翠彩發蛾眉嬌子多好言歡合易為姿玉顏盛有時秀色隨年衰常恐新間舊變故興細微浮萍無根本非水將何依憂喜更相接樂極還自悲玉臺新詠箋注二樂府詩集六十五廣文選十三詩紀二十二又類聚四十一作怨詩引衣眉衰微依五韻秋蘭篇秋蘭篇秋蘭映玉池池水清且芳芙蓉隨風發中有雙鴛鴦雙魚自踴躍兩鳥時回翔君其歷九秋與妾同衣裳玉臺新詠箋注二樂府詩集六十四詩紀二十二又類聚八十一初學記二十七御覽九百八十三並作詠秋蘭詩並引芳翔二韻前有一樽酒行置酒結此會主人起行觴玉樽兩楹間絲理東西廂舞袖一何妙變化窮萬方賓主齊德量欣欣樂未央同享千年壽朋來會此堂樂府詩集六十五詩紀二十二何當行同聲自相應同心自相知外合不由中雖固終必離管鮑不世出結交安可為樂府詩集七十六文選補遺三十四詩紀二十二卻東西門行卻東西門行金遲絲竹聲大悲和樂唯有舞運體不失機退似前龍婉進如翔鸞飛回目流神光傾亞有餘姿宋本初學記十五詩紀二十二又初學記十五引機飛二韻美女篇美人一何麗顏若芙蓉花一顧亂人國再顧亂人家未亂猶可奈何樂府詩集六十三詩紀二十二飛塵篇飛塵穢清流朝雲蔽日光秋蘭豈不芬鮑肆亂其芳河決潰金堤一手不能障類聚六樂府詩集六十四詩紀二十二歷九秋篇董逃行歷九秋篇董逃行歷九秋兮三春遺貴客兮遠賓顧多君心所親乃命妙伎才人炳若日月星辰序金罍兮玉觴賓主遞起雁行杯若飛電絶光交觴接巵結裳慷慨歡笑萬方奏新詩兮夫君爛然虎變龍文渾如天地未分齊謳楚舞紛紛歌聲上激青雲窮八音兮異倫奇聲靡靡每新微笑素齒丹唇逸響飛薄梁塵精爽眇眇入神坐咸醉兮沾歡引樽促席臨軒進爵獻壽翩翻千秋要君一言願愛不移若山君恩愛兮不竭譬若朝日夕月此景萬里不絶長保初醮結髮何憂坐生胡越攜弱手兮金環上遊飛閣雲間穆若鴛鳳雙鸞還幸蘭房自安娛心極意難原樂既極兮多懷盛時忽逝若頽寒暑革御景回春榮隨風飄摧感物動心增哀妾受命兮孤虛男兒墮地稱姝女弱雖存若無骨肉至親更疏奉事他人托軀君如影兮隨形賤妾如水浮萍明月不能常盈誰能無根保榮良時冉冉代征顧繡領兮含輝皎日回光側微朱華忽爾漸衰影欲捨形高飛誰言往恩可追薺與麥兮夏零蘭桂踐霜逾馨祿命懸天難明委心結意丹青何憂君心中傾玉臺新詠箋注九樂府詩集三十四廣文選十三又文選四南都賦注古樂府有歷九秋妾薄命行歌辭引紛雲二韻類聚四十二引倫唇塵神四韻草堂詩箋三十四錦樹行注引殊無二韻吳楚歌吳楚歌燕人美兮趙女佳其室則邇兮限層崖雲為車兮風為馬玉在山兮蘭在野雲無期兮風有止思心多端兮誰能理玉臺新詠箋注九作燕人美篇類聚四十三作燕人美兮歌樂府詩集八十三廣文選十四詩紀二十二又御覽八作傅玄歌引馬野止里四韻鴻鴈生塞北行鳳凰遠生海西及時崑山岡五德存羽儀和鳴定宮商百鳥竝侍左右鼓翼騰華光上熙遊雲日間千歲時來翔孰若彼龍與龜曳尾泥中藏非雲雨則不升冬伏春乃驤退哀此秋蘭草根絶隨化揚靈氣一何憂美萬里馳芬芳常恐物微易歇一朝見棄忘樂府詩集三十七詩紀二十二白楊行青雲固非青當雲奈白雲驥從西北馳來吾何憶驥來對我悲鳴舉頭氣凌青雲當奈此驥正龍形踠足蹉跎長坡下蹇驢慷愾敢與我爭馳躑躅鹽車之中流汗兩耳盡下垂雖懷千里之逸志當時一得施白雲彯彯舍我高翔青雲徘徊戢我愁啼上眄增崖下臨清池日欲西移既來歸君君不一顧仰天太息當用生為青雲乎飛時悲當奈何耶青雲飛乎樂府詩集四十詩紀二十二秦女休行龐氏有烈婦義聲馳雍涼父母家有重怨仇人暴且彊雖有男兄弟志弱不能當烈女念此痛丹心為寸傷外若無意者內潛思無方白日入都市怨家如平常匿劍藏白刃一奮尋身僵身首為之異處伏尸列肆旁肉與土合成泥灑血濺飛梁猛氣上干雲霓仇黨失守為披攘一市稱烈義觀者收淚竝慨慷百男何當益不如一女良烈女直造縣門云父不幸遭禍殃今仇身以分裂雖死情益揚殺人當伏法義不苟活隳舊章縣令解印綬令我傷心不忍聽刑部垂頭塞耳令我吏舉不能成烈著希代之績義立無窮之名夫家同受其祚子子孫孫咸享其榮今我作歌詠高風激揚壯發悲且清樂府詩集六十一詩紀二十二雲中白子高行陵陽子來明意欲作天與仙人遊超登元氣攀日月遂造天門將上謁閶闔闢見紫微絳闕紫宮崔嵬高殿嵯峨雙闕萬丈玉樹羅童女掣電策童男挽雷車雲漢隨天流浩浩如江河因王長公謁上皇鈞天樂作不可詳龍仙神仙教我靈祕八風子儀與遊我祥我心何戚戚思故鄉俯看故鄉二儀設張樂哉二儀日月運移地東南傾天西北馳鶴五氣所補鼇四足所支齊駕飛龍驂赤螭逍遙五嶽間東西馳長與天地竝復何為復何為樂府詩集六十三廣文選十三詩紀二十二又編珠一草堂詩箋七高都詩注書鈔百五十二並作傅玄詩引車一韻御覽十三作傅玄詩引童女掣電四字西長安行所思兮何在乃在西長安何用存問妾香䙞雙珠環何用重存問羽爵翠琅玕今我兮聞君更有兮異心香亦不可燒環亦不可沈香燒日有歇環沈日自深玉臺新詠箋注二廣文選十三詩紀二十二車遙遙篇車遙遙篇車遙遙兮馬洋洋追思君兮不可忘君安遊兮西入秦願為影兮隨君身君在陰兮影不見君依光兮妾所願玉臺新詠箋注九文選補遺三十四樂府詩集六十九作梁車操辭廣文選十三詩紀二十二又類聚四十二作車遙篇引洋忘秦身四韻昔思君昔君與我兮形影潛結今君與我兮雲飛雨絶昔君與我兮音響相和今君與我兮落葉去柯昔君與我兮金石無虧今君與我兮星滅光離樂府詩集七十四廣文選十三詩紀二十二答程曉詩奕奕兩儀昭昭太陽四氣代升三朝受祥濟濟群后峨峨聖皇元服肇御配天垂光伊州作弼王室惟康顒顒兆民蠢蠢戎羶率土充庭萬國奉蕃皇澤雲行神化風宣六合咸熙遐邇同歡赫赫明明天人合和下罔遺滯焦朽斯華矧我良朋如玉之嘉穆穆雍雍興頌作歌類聚三十一廣文選十三詩紀二十二宴會詩日之既逝情亦既渥賓委餘歡主容不足樂飲今夕溫其如玉初學記十四詩紀二十二芙蕖煌煌芙蕖從風芬葩照以皎日灌以清波陰結其實陽發其華金房緑葉素株翠柯類聚八十二初學記二十七萬花谷後三十七詩紀二十二作芙蕖雜詩三首志士惜日短愁人知夜長攝衣步前庭仰觀南鴈翔玄景隨形運流響歸空房清風何飄颻微月出西方繁星衣青天列宿自成行蟬鳴高樹間野鳥號東廂纖雲時髣佛渥露沾我裳良時無停景北斗忽低昂常恐寒節至凝氣結為霜落葉隨風摧一絶如流光文選二十九文章正宗二十九詩紀二十二又文選十四舞鶴賦注引一句閒夜微風起明月照高臺清響呼不應玄景招不來廚人進藿茹有酒不盈杯安貧福所與富貴為禍媒金玉雖高堂於我賤蒿萊類聚二十六廣文選十五詩紀二十二又書鈔百五十引臺一韻鵲巢丘城側雀乳空井中居不附龍鳳常畏蛇與蟲依賢義不恐近暴自當窮類聚九十二廣文選十五詩紀二十二又答程曉羲和運玉衡招搖賦朔旬嘉慶形三朝美德揚初春聖主加元服萬國望威神伊周敷玄化竝世霑天人洪崖歌山岫許由嗟水濱類聚三十一詩紀二十二宴詩鸞鳥晞鳳皇望舒繼白日千秋遘嘉會來升君子室華樽享清酤珍肴自盈溢初學記十四詩紀二十二天行篇天行篇天行一何健日月無停縱百川皆赴海三辰回泰蒙類聚一初學記一作歌天詩詩紀二十二日升歌東光升朝陽羲和初攬轡六龍竝騰驤逸景何晃晃旭日照萬方皇德配天地神明鑒幽荒類聚一詩紀二十二三光篇三光篇三光垂象表天地有晷度聲和音響應形立影自附素白抱玄烏明月懷靈兔衆星詩朗月共衆星日出擅其明冬寒地為裂春和草木榮陽德雖普濟非陰亦不成類聚一詩紀二十二季冬詩季冬時慘烈猛寒不可勝嚴風截人耳素雪墜地凝林上飛霜起波中自生冰未夕結重衾崇朝不敢興御覽二十七三十四又書鈔百五十六引一句炎旱詩炎旱歷三時天運失其道河中飛塵起野田無生草一餐重丘山哀哀以終老君無半粒儲形影不相保御覽四百八十六無題無題一徂暑未一旬重陽翳朝霞厥初月離畢積日遂滂沱屯雲結不解長溜周四阿霖雨如倒井黃潦起洪波湍深激牆隅門庭若決河炊爨不復舉竈中生蛙蝦類聚二作傅玄詩詩紀二十二又書鈔百五十作傅玄詩引阿一韻百五十一傅玄詩引一句編珠一傅玄詩引波河二韻韻補二引河蝦二韻無題無題二朱明運將極溽暑晝夜興裁動四支廢舉身若山陵珠汗洽玉體呼吸氣鬱蒸塵垢自成泥素粉隨手凝類聚五作傅玄詩御覽三十四作傅玄詩詩紀二十二又書鈔百五十六引呼吸氣鬱蒸一句古詩東方大明星光景照千里少年舍家遊思心晝夜起類聚一詩紀二十二擬四愁詩四首并序昔張平子作四愁詩體小而俗七言類也聊擬而作之名曰擬四愁詩其辭曰我所思兮在瀛洲願為雙鵠戲中流牽牛織女期在秋山高水深路無由愍豫不遘嬰殷憂佳人貽我明月珠何以要之比目魚海廣無舟悵勞劬寄言飛龍天馬駒風起雲披飛龍逝驚波滔天馬不厲何為多念心憂世玉臺新詠箋注九詩紀二十二又御覽四百七十八引珠魚二韻我所思兮在珠崖願為比翼浮清池剛柔合德配二儀形影一絶長別離愍豫不遘情如攜佳人貽我蘭蕙草何以要之同心鳥火熱水深憂盈抱申以琬琰夜光寶卞和既沒玉不察存若流光忽電滅何為多念獨蘊結玉臺新詠箋注九詩紀二十二我所思兮在崑山願為鹿𪊤窺虞淵日月回耀照景天參差曠隔會無緣愍豫不遘罹百艱佳人贈我蘇合香何以要之翠鴛鴦懸度弱水川無梁申以錦衣文繡裳三光騁邁景不留鮮矣民生忽如浮何為多念祗自愁玉臺新詠箋注九詩紀二十二御覽四百七十八引香鴦二韻我所思兮在朔方願為飛燕俱南翔煥乎人道著三光胡越殊心生異鄉愍豫不遘罹百殃佳人貽我羽葆纓何以要之影與形增冰憂結繁華零申以日月指明星星辰有翳日月移駑馬哀鳴慚不馳何為多念徒自虧玉臺新詠箋注九詩紀二十二兩儀詩兩儀始分元氣清列宿垂象六位成日月西流景東征悠悠萬物殊品名聖人憂代念群生萬花谷後一作傅玄詩詩紀二十二無題無題三天時泰兮昭以陽清風起兮景雲翔仰觀兮辰象日月兮運周俯視兮河海百川兮東流類聚一詩紀二十二驚雷歌驚雷奮兮震萬里威陵宇宙兮動四海六合不維兮誰能理類聚二初學記一詩紀二十二雜言雷隱隱感妾心傾耳清聽非車音類聚二初學記一白帖一詩紀二十二雲歌白雲翩翩翔天庭流景髣佛非君形白雲飄飄捨我高翔青雲徘徊為我愁腸類聚一詩紀二十二蓮歌渡江南採蓮花芙蓉增敷曄若星羅緑葉映長波回風容與動纖柯類聚八十二詩紀二十二作蓮歌啄木啄木高翔鳴喈喈飄搖林薄著桑槐緣樹間喙如錐嚶喔嚶喔聲正悲專為萬物作倡俳當此之時樂不可回類聚九十二合璧事類別集七十一詩紀二十二雜歌鳳有翼龍有鱗君不獨興必須良臣初學記十九九曲歌九曲歌歲莫景邁群光絶安得長繩繫白日御覽七百六十六詩紀二十二歌詞雷師鳴鐘鼓風伯吹笙簧西母出穴聽王父吟東廂初學記十六失題五首湯谷發清曜九日棲高枝願得竝天御六龍齊玉羈類聚一作晉傅玄詩詩紀二十二又書鈔百四十九引枝一韻二有女殊代生涉江采菱花上翳青雲景下鑒淥水波初學記六詩紀二十二三彎我繁弱弓弄我丈八矟一舉覆三軍再舉殄戎貊類聚六十御覽三百五十四詩紀二十二四元正始朝享萬國執圭璋枝燈若火樹庭燎繼天光類聚八十詩紀二十二又書鈔百五十五引璋一韻五飛蓬隨飄起芳草摧山澤世有千年松人生詎能百類聚八十八詩紀二十二
